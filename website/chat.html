<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>exo chat</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101014;
        --panel: #181820;
        --line: #30303b;
        --text: #ececf1;
        --muted: #9b9ba7;
        --accent: #ffb088;
        --good: #7fd4a8;
        --bad: #ff7777;
        --mono:
          "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        background: var(--bg);
        color: var(--text);
        font-family: var(--mono);
      }

      .app {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-height: 100svh;
      }

      header {
        border-bottom: 1px solid var(--line);
        padding: 16px;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .status {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px 8px;
      }

      .pill.good {
        border-color: color-mix(in srgb, var(--good) 55%, var(--line));
        color: var(--good);
      }

      .pill.bad {
        border-color: color-mix(in srgb, var(--bad) 55%, var(--line));
        color: var(--bad);
      }

      main {
        overflow-y: auto;
        padding: 16px;
      }

      .log {
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 880px;
      }

      .message {
        width: fit-content;
        max-width: min(78ch, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 10px 12px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .message.self {
        align-self: flex-end;
        border-color: color-mix(in srgb, var(--accent) 45%, var(--line));
      }

      .meta {
        margin-bottom: 4px;
        color: var(--muted);
        font-size: 11px;
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        border-top: 1px solid var(--line);
        padding: 12px;
      }

      textarea {
        min-height: 44px;
        max-height: 160px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
        font: inherit;
        line-height: 1.45;
        padding: 10px;
      }

      button {
        min-width: 72px;
        border: 1px solid color-mix(in srgb, var(--accent) 55%, var(--line));
        border-radius: 8px;
        background: #211a17;
        color: var(--accent);
        font: inherit;
        cursor: pointer;
      }

      button:disabled,
      textarea:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .notice {
        max-width: 72ch;
        color: var(--muted);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1 id="title">exo chat</h1>
        <div class="status">
          <span id="role" class="pill">role</span>
          <span id="signal" class="pill">signaling</span>
          <span id="peer" class="pill">peer</span>
          <span id="data" class="pill">datachannel</span>
        </div>
      </header>

      <main>
        <div id="log" class="log"></div>
      </main>

      <form id="form">
        <textarea
          id="input"
          autocomplete="off"
          placeholder="Message"
          rows="1"
          disabled
        ></textarea>
        <button id="send" type="submit" disabled>Send</button>
      </form>
    </div>

    <script src="/chat.js"></script>
  </body>
</html>
