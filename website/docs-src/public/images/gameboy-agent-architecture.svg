<svg viewBox="0 0 780 230" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <rect width="780" height="230" fill="#f9fafb"/>

  <!-- model box -->
  <rect x="16" y="60" width="170" height="110" rx="16" fill="#c9daf8" stroke="#1b1918" stroke-width="2"/>
  <text x="101" y="105" text-anchor="middle" font-size="17" font-weight="600" fill="#1b1918">model</text>
  <text x="101" y="128" text-anchor="middle" font-size="13" fill="#1b1918">vision + tools</text>

  <!-- harness box -->
  <rect x="298" y="60" width="190" height="110" rx="16" fill="#d9ead3" stroke="#1b1918" stroke-width="2"/>
  <text x="393" y="98" text-anchor="middle" font-size="17" font-weight="600" fill="#1b1918">exo turn loop</text>
  <text x="393" y="120" text-anchor="middle" font-size="14" fill="#1b1918">+ harness</text>
  <text x="393" y="140" text-anchor="middle" font-size="12" fill="#4b5563">TypeScript</text>

  <!-- emulator box -->
  <rect x="598" y="60" width="166" height="110" rx="16" fill="#fce5cd" stroke="#1b1918" stroke-width="2"/>
  <text x="681" y="98" text-anchor="middle" font-size="17" font-weight="600" fill="#1b1918">emulator</text>
  <text x="681" y="120" text-anchor="middle" font-size="14" fill="#1b1918">sidecar</text>
  <text x="681" y="140" text-anchor="middle" font-size="12" fill="#4b5563">Python / PyBoy</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1b1918"/>
    </marker>
  </defs>

  <!-- model <-> harness -->
  <line x1="192" y1="92" x2="292" y2="92" stroke="#1b1918" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="242" y="80" text-anchor="middle" font-size="12" fill="#1b1918">tool calls</text>
  <line x1="292" y1="145" x2="192" y2="145" stroke="#1b1918" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="242" y="196" text-anchor="middle" font-size="12" fill="#1b1918">screen + RAM state</text>

  <!-- harness <-> emulator -->
  <line x1="494" y1="92" x2="592" y2="92" stroke="#1b1918" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="543" y="80" text-anchor="middle" font-size="12" fill="#1b1918">HTTP (localhost)</text>
  <line x1="592" y1="145" x2="494" y2="145" stroke="#1b1918" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="543" y="196" text-anchor="middle" font-size="12" fill="#1b1918">screenshot + RAM</text>
  <text x="543" y="212" text-anchor="middle" font-size="12" fill="#1b1918">state per action</text>
</svg>
