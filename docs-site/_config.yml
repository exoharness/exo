title: exo
description: A minimal, durable substrate for building AI agents.
theme: just-the-docs

# Site URL (update when deploying, e.g. GitHub Pages or custom domain)
url: ""
baseurl: ""

search_enabled: true
search:
  heading_level: 3
  button: false

heading_anchors: true

aux_links:
  "GitHub":
    - "https://github.com/ankrgyl/exo"
aux_links_new_tab: true

nav_enabled: true

color_scheme: light

callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

# Footer
back_to_top: true
back_to_top_text: "Back to top"

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
